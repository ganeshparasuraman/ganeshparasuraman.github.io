name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build (production)
        run: npx ng build --configuration production

      - name: Add SPA fallback and disable Jekyll
        # GitHub Pages serves 404.html for unknown paths; copying index.html there
        # lets the Angular router resolve deep links like /dto-blog on refresh.
        run: |
          cp dist/ganeshsite/browser/index.html dist/ganeshsite/browser/404.html
          touch dist/ganeshsite/browser/.nojekyll

      - name: Deploy to gh-pages branch
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./dist/ganeshsite/browser
          publish_branch: gh-pages
          cname: dev.ganesh.ky
