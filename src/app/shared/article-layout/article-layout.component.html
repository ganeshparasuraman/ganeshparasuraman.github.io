<header class="article-hero">
  <div class="hero-inner">
    <span class="eyebrow">{{ eyebrow }}</span>
    <h1>{{ heading }}</h1>
    @if (subtitle) {
      <p class="subtitle">{{ subtitle }}</p>
    }
    @if (meta.length) {
      <div class="byline" aria-label="Article details">
        @for (m of meta; track m; let last = $last) {
          <span class="byline-item">{{ m }}</span>
          @if (!last) {
            <span class="byline-sep" aria-hidden="true">·</span>
          }
        }
      </div>
    }
  </div>
</header>

<div class="article-wrap" [class.has-toc]="toc.length">
  @if (toc.length) {
    <nav class="toc" aria-label="Table of contents">
      <h2>Contents</h2>
      @for (item of toc; track item.id) {
        <a [routerLink]="[]" [fragment]="item.id">{{ item.label }}</a>
      }
    </nav>
  }

  <div class="article-body">
    <ng-content />
  </div>
</div>
